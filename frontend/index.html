<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketFast Reservas</title>
</head>
<body>
  <h1>TicketFast Reservas</h1>
  <form id="reserva-form">
    <div>
      <label for="email">Correo electrónico</label>
      <input data-testid="input-email-cliente" id="email" type="email" required />
    </div>
    <div>
      <label for="zona">Zona</label>
      <select data-testid="select-zona-evento" id="zona" required>
        <option value="">Seleccione</option>
        <option value="VIP">VIP</option>
        <option value="General">General</option>
      </select>
    </div>
    <div>
      <label for="cantidad">Cantidad de asientos</label>
      <input data-testid="input-cantidad-asientos" id="cantidad" type="number" min="1" value="1" required />
    </div>
    <button type="submit" data-testid="btn-confirmar-reserva">Confirmar reserva</button>
  </form>

  <div id="resumen" data-testid="seccion-resumen-total"></div>

  <script src="app.js"></script>
</body>
</html>
