services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ticketfast_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    tmpfs:
      - /var/lib/postgresql/data

  api-test:
    build: .
    depends_on:
      - db-test
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db-test:5432/ticketfast_test
